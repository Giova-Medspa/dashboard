<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GIOVA Revenue Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Roboto+Condensed:wght@400;600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
:root {
  --g-dark: #2e2e2e;
  --g-brown: #5a4f42;
  --g-pigeon: #6b7378;
  --g-sky: #d1dddb;
  --g-beige: #cba98a;
  --g-med-beige: #ead9c1;
  --g-vanilla: #f4efea;
  --g-cream: #fffded;
  --g-teal: #008989;
  --g-green: #4a9e6e;
  --g-red: #c4564a;
  --g-amber: #d4a24e;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Lato', sans-serif; background: var(--g-vanilla); color: var(--g-dark); line-height: 1.5; -webkit-font-smoothing: antialiased; }
.dashboard { max-width: 1200px; margin: 0 auto; padding: 40px 24px 80px; }

/* Header */
.dash-header { position: relative; text-align: center; margin-bottom: 40px; padding-bottom: 28px; border-bottom: 1px solid var(--g-med-beige); }
.logo-wrap { position: absolute; left: 0; top: 50%; transform: translateY(-50%); }
.logo-wrap .logo-img { height: 108px; width: auto; display: block; }
.header-center { text-align: center; }
.dash-header h1 { font-family: 'Cormorant Garamond', serif; font-weight: 400; font-size: 37px; color: var(--g-dark); letter-spacing: 2px; margin-bottom: 4px; }
.dash-header .meta { font-family: 'Roboto Condensed', sans-serif; font-size: 12px; letter-spacing: 3px; text-transform: uppercase; color: var(--g-pigeon); }

/* Period & Month Controls */
.controls-bar { display: flex; justify-content: center; align-items: center; gap: 20px; margin-bottom: 28px; flex-wrap: wrap; }
.period-tabs { display: flex; gap: 0; border: 1px solid var(--g-med-beige); border-radius: 5px; overflow: hidden; }
.period-tab { padding: 8px 18px; background: #fff; color: var(--g-dark); font-family: 'Roboto Condensed', sans-serif; font-size: 11px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; border: none; border-right: 1px solid var(--g-med-beige); transition: all 0.2s; }
.period-tab:last-child { border-right: none; }
.period-tab:hover { background: var(--g-cream); }
.period-tab.active { background: var(--g-brown); color: #fff; }
.month-select { padding: 8px 14px; border: 1px solid var(--g-med-beige); border-radius: 5px; font-family: 'Roboto Condensed', sans-serif; font-size: 12px; letter-spacing: 1px; background: #fff; color: var(--g-dark); cursor: pointer; }

/* Nav */
.nav-bar { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; margin-bottom: 28px; }
.nav-btn { padding: 9px 19px; border: 1px solid var(--g-med-beige); background: #fff; color: var(--g-dark); font-family: 'Roboto Condensed', sans-serif; font-size: 12px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; border-radius: 4px; transition: all 0.2s; text-decoration: none; }
.nav-btn:hover { border-color: var(--g-brown); color: var(--g-brown); }
.nav-btn.active { background: var(--g-brown); color: #fff; border-color: var(--g-brown); }

/* Upload */
.upload-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(46,46,46,0.5); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(3px); }
.upload-overlay.open { display: flex; }
.upload-panel { background: #fff; border-radius: 12px; padding: 36px 40px; max-width: 580px; width: 90%; box-shadow: 0 20px 60px rgba(0,0,0,0.2); position: relative; text-align: center; }
.upload-panel .close-btn { position: absolute; top: 14px; right: 18px; background: none; border: none; font-size: 22px; color: var(--g-pigeon); cursor: pointer; line-height: 1; }
.upload-panel .close-btn:hover { color: var(--g-dark); }
.upload-drop { border: 2px dashed var(--g-med-beige); border-radius: 10px; padding: 28px; margin-bottom: 20px; transition: all 0.2s; }
.upload-drop.drag-over { border-color: var(--g-teal); background: rgba(0,137,137,0.03); }
.upload-drop .upload-icon { font-size: 36px; color: var(--g-beige); margin-bottom: 10px; }
.upload-drop h3 { font-family: 'Cormorant Garamond', serif; font-weight: 400; font-size: 21px; color: var(--g-dark); margin-bottom: 6px; }
.upload-drop input[type=file] { display: none; }
.upload-btn { display: inline-block; padding: 10px 24px; border: 1px solid var(--g-beige); background: transparent; color: var(--g-brown); font-family: 'Roboto Condensed', sans-serif; font-size: 11px; font-weight: 600; letter-spacing: 3px; text-transform: uppercase; cursor: pointer; border-radius: 4px; transition: all 0.2s; }
.upload-btn:hover { background: var(--g-brown); color: #fff; border-color: var(--g-brown); }
.upload-status { margin-top: 12px; font-size: 13px; min-height: 20px; }
.month-chips { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; }
.month-chip { padding: 5px 12px; background: var(--g-cream); border-radius: 3px; font-family: 'Roboto Condensed', sans-serif; font-size: 10px; font-weight: 600; letter-spacing: 1px; color: var(--g-brown); display: inline-flex; align-items: center; gap: 6px; }
.month-chip .del { cursor: pointer; opacity: 0.5; font-size: 14px; }
.month-chip .del:hover { opacity: 1; color: var(--g-red); }

/* Commission Summary */
.commission-section { background: #fff; border-radius: 8px; padding: 28px; margin-bottom: 48px; box-shadow: 0 2px 12px rgba(0,0,0,0.04); border: 1px solid rgba(114,100,83,0.08); }
.commission-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-top: 16px; }
.commission-card { background: var(--g-cream); border-radius: 6px; padding: 16px; }
.commission-card .comm-name { font-family: 'Roboto Condensed', sans-serif; font-size: 11px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: var(--g-pigeon); margin-bottom: 6px; }
.commission-card .comm-total { font-family: 'Cormorant Garamond', serif; font-size: 28px; color: var(--g-dark); }
.commission-card .comm-breakdown { font-size: 12px; color: var(--g-pigeon); margin-top: 6px; }
.commission-card .comm-breakdown span { display: block; margin-top: 2px; }
.commission-card .comm-type { display: inline-block; margin-top: 6px; padding: 2px 8px; border-radius: 3px; font-family: 'Roboto Condensed', sans-serif; font-size: 9px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; }
.comm-type-salary { background: var(--g-sky); color: var(--g-pigeon); }
.comm-type-commission { background: rgba(0,137,137,0.1); color: var(--g-teal); }
.commission-total-bar { display: flex; justify-content: space-between; align-items: center; margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--g-med-beige); }
.commission-total-bar .total-label { font-family: 'Roboto Condensed', sans-serif; font-size: 11px; font-weight: 600; letter-spacing: 3px; text-transform: uppercase; color: var(--g-pigeon); }
.commission-total-bar .total-value { font-family: 'Cormorant Garamond', serif; font-size: 33px; color: var(--g-dark); }
.commission-unavailable { text-align: center; padding: 20px; color: var(--g-pigeon); font-size: 13px; }

/* Download */
.download-bar { display: flex; justify-content: center; gap: 12px; margin-bottom: 36px; flex-wrap: wrap; }
.dl-btn { display: inline-flex; align-items: center; gap: 6px; padding: 10px 20px; border: 1px solid var(--g-beige); background: transparent; color: var(--g-brown); font-family: 'Roboto Condensed', sans-serif; font-size: 11px; font-weight: 600; letter-spacing: 3px; text-transform: uppercase; cursor: pointer; border-radius: 4px; transition: all 0.2s; }
.dl-btn:hover { background: var(--g-brown); color: #fff; border-color: var(--g-brown); }
.dl-btn svg { width: 14px; height: 14px; }

/* Section Labels */
.section-label { font-family: 'Roboto Condensed', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 4px; text-transform: uppercase; color: var(--g-brown); margin-bottom: 20px; padding-bottom: 8px; border-bottom: 2px solid var(--g-med-beige); }

/* Exec Grid */
.exec-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 48px; }
.exec-card { background: #fff; border-radius: 8px; padding: 24px; box-shadow: 0 2px 12px rgba(0,0,0,0.04); border: 1px solid rgba(114,100,83,0.08); }
.exec-card .label { font-family: 'Roboto Condensed', sans-serif; font-size: 10px; font-weight: 600; letter-spacing: 3px; text-transform: uppercase; color: var(--g-pigeon); margin-bottom: 8px; }
.exec-card .value { font-family: 'Cormorant Garamond', serif; font-weight: 400; font-size: 33px; color: var(--g-dark); }
.exec-card .value.goal-hit { color: var(--g-green); }
.exec-card .sub { font-size: 13px; font-weight: 400; color: var(--g-pigeon); margin-top: 4px; }

/* Progress */
.team-progress { background: #fff; border-radius: 8px; padding: 24px; margin-bottom: 48px; box-shadow: 0 2px 12px rgba(0,0,0,0.04); border: 1px solid rgba(114,100,83,0.08); }
.progress-track { height: 12px; background: var(--g-sky); border-radius: 6px; overflow: hidden; margin: 12px 0 8px; }
.progress-fill { height: 100%; border-radius: 6px; transition: width 0.8s ease; }
.progress-labels { display: flex; justify-content: space-between; font-size: 12px; color: var(--g-pigeon); }
.mix-row { display: flex; gap: 8px; margin-top: 8px; }
.mix-bar { height: 28px; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-family: 'Roboto Condensed', sans-serif; font-size: 11px; font-weight: 600; letter-spacing: 1px; color: #fff; transition: width 0.8s ease; }

/* Rankings */
.rankings { background: #fff; border-radius: 8px; padding: 28px; margin-bottom: 48px; box-shadow: 0 2px 12px rgba(0,0,0,0.04); border: 1px solid rgba(114,100,83,0.08); }
.rank-row { display: grid; grid-template-columns: 32px 180px 1fr 100px 80px; align-items: center; gap: 16px; padding: 14px 0; border-bottom: 1px solid rgba(114,100,83,0.06); cursor: pointer; }
.rank-row:last-child { border-bottom: none; }
.rank-row:hover { background: var(--g-cream); margin: 0 -12px; padding: 14px 12px; border-radius: 4px; }
.rank-num { font-family: 'Cormorant Garamond', serif; font-size: 21px; font-weight: 600; color: var(--g-beige); }
.rank-name { font-weight: 400; font-size: 15px; color: var(--g-dark); }
.rank-name .title { font-family: 'Roboto Condensed', sans-serif; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--g-pigeon); display: block; margin-top: 2px; }
.rank-bar { height: 8px; background: var(--g-sky); border-radius: 4px; overflow: hidden; }
.rank-bar-fill { height: 100%; border-radius: 4px; transition: width 0.8s ease; }
.rank-rev { text-align: right; font-size: 15px; font-weight: 700; color: var(--g-dark); }
.rank-pct { text-align: right; font-family: 'Roboto Condensed', sans-serif; font-size: 14px; font-weight: 600; }
.rank-header { display: grid; grid-template-columns: 32px 180px 1fr 100px 80px; gap: 16px; padding-bottom: 10px; margin-bottom: 4px; border-bottom: 2px solid var(--g-med-beige); }
.rank-header span { font-family: 'Roboto Condensed', sans-serif; font-size: 10px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: var(--g-pigeon); }
.rank-header span:nth-child(4), .rank-header span:nth-child(5) { text-align: right; }

/* Scorecards */
.scorecards { display: grid; grid-template-columns: 1fr; gap: 32px; margin-bottom: 48px; }
.scorecard { background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.06); border: 1px solid rgba(114,100,83,0.08); }
.sc-header { padding: 28px 32px 20px; display: flex; justify-content: space-between; align-items: flex-start; border-bottom: 1px solid rgba(114,100,83,0.06); }
.sc-header .name { font-family: 'Cormorant Garamond', serif; font-weight: 400; font-size: 29px; color: var(--g-dark); }
.sc-header .goal-badge .goal-label { font-family: 'Roboto Condensed', sans-serif; font-size: 10px; font-weight: 600; letter-spacing: 3px; text-transform: uppercase; color: var(--g-pigeon); }
.sc-header .goal-badge .goal-value { font-family: 'Cormorant Garamond', serif; font-weight: 300; font-size: 25px; color: var(--g-brown); }
.sc-header .goal-badge { text-align: right; }
.sc-progress { padding: 16px 32px; background: var(--g-cream); }
.sc-progress .track { height: 10px; background: var(--g-sky); border-radius: 5px; overflow: hidden; }
.sc-progress .fill { height: 100%; border-radius: 5px; }
.sc-progress .progress-info { display: flex; justify-content: space-between; margin-top: 8px; font-size: 13px; }
.sc-progress .pct { font-family: 'Roboto Condensed', sans-serif; font-weight: 700; font-size: 15px; }
.sc-progress .remaining { color: var(--g-pigeon); }
.sc-body { padding: 24px 32px 28px; display: grid; grid-template-columns: 1fr 1fr; gap: 28px; }
.sc-section-label { font-family: 'Roboto Condensed', sans-serif; font-size: 10px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; color: var(--g-brown); margin-bottom: 14px; padding-bottom: 6px; border-bottom: 1px solid var(--g-med-beige); }

/* Pacing */
.pacing-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.pace-block { background: var(--g-cream); border-radius: 6px; padding: 14px 16px; }
.pace-block .pace-label { font-family: 'Roboto Condensed', sans-serif; font-size: 9px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: var(--g-pigeon); margin-bottom: 6px; }
.pace-block .pace-row { display: flex; justify-content: space-between; align-items: baseline; font-size: 13px; color: var(--g-dark); margin-bottom: 3px; }
.pace-block .pace-row .amt { font-weight: 700; }
.pace-block .pace-total { display: flex; justify-content: space-between; align-items: baseline; font-size: 15px; font-weight: 700; color: var(--g-dark); margin-top: 6px; padding-top: 6px; border-top: 1px solid var(--g-med-beige); }

/* Category Table */
.cat-table { width: 100%; border-collapse: collapse; }
.cat-table th { font-family: 'Roboto Condensed', sans-serif; font-size: 10px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: var(--g-pigeon); text-align: left; padding: 0 0 8px; border-bottom: 1px solid var(--g-med-beige); }
.cat-table th:nth-child(2), .cat-table th:nth-child(3), .cat-table th:nth-child(4) { text-align: right; }
.cat-table td { padding: 7px 0; font-size: 13px; border-bottom: 1px solid rgba(114,100,83,0.05); }
.cat-table td:nth-child(2), .cat-table td:nth-child(3), .cat-table td:nth-child(4) { text-align: right; font-variant-numeric: tabular-nums; }
.cat-table td:first-child { font-weight: 400; color: var(--g-dark); max-width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.cat-table td:nth-child(2) { font-weight: 700; }
.cat-table tr:last-child td { border-bottom: none; }
.cat-table .cat-bar { display: inline-block; height: 4px; border-radius: 2px; background: var(--g-beige); margin-right: 8px; vertical-align: middle; }

/* Products */
.prod-list { list-style: none; }
.prod-list li { display: flex; justify-content: space-between; font-size: 13px; padding: 5px 0; border-bottom: 1px solid rgba(114,100,83,0.05); }
.prod-list li:last-child { border-bottom: none; }
.prod-list .prod-name { color: var(--g-dark); max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.prod-list .prod-amt { font-weight: 700; font-variant-numeric: tabular-nums; }

/* Stats */
.stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 16px; }
.stat-box { background: var(--g-cream); border-radius: 6px; padding: 12px; text-align: center; }
.stat-box .stat-val { font-family: 'Cormorant Garamond', serif; font-size: 23px; font-weight: 400; color: var(--g-dark); }
.stat-box .stat-label { font-family: 'Roboto Condensed', sans-serif; font-size: 9px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: var(--g-pigeon); margin-top: 2px; }

/* Status */
.status-badge { display: inline-block; padding: 3px 10px; border-radius: 3px; font-family: 'Roboto Condensed', sans-serif; font-size: 11px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; }
.status-green { background: rgba(74,158,110,0.1); color: var(--g-green); }
.status-red { background: rgba(196,86,74,0.1); color: var(--g-red); }
.status-amber { background: rgba(212,162,78,0.1); color: var(--g-amber); }

/* Footer */
.dash-footer { text-align: center; padding-top: 32px; border-top: 1px solid var(--g-med-beige); margin-top: 48px; }
.dash-footer p { font-family: 'Roboto Condensed', sans-serif; font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--g-pigeon); }

/* Data Editor */
.data-editor { background: var(--g-dark); border-radius: 8px; padding: 20px; margin-bottom: 40px; }
.data-editor summary { font-family: 'Roboto Condensed', sans-serif; font-size: 11px; font-weight: 600; letter-spacing: 3px; text-transform: uppercase; color: var(--g-beige); cursor: pointer; padding: 4px 0; }
.data-editor textarea { width: 100%; height: 400px; margin-top: 12px; background: #3a3a3a; color: #e0d8cf; border: 1px solid rgba(203,169,138,0.2); border-radius: 4px; padding: 16px; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 12px; line-height: 1.6; resize: vertical; tab-size: 2; }
.data-editor .btn-row { display: flex; gap: 12px; margin-top: 12px; }
.data-editor button { padding: 8px 20px; border: 1px solid var(--g-beige); background: transparent; color: var(--g-beige); font-family: 'Roboto Condensed', sans-serif; font-size: 11px; font-weight: 600; letter-spacing: 3px; text-transform: uppercase; cursor: pointer; border-radius: 3px; transition: all 0.2s; }
.data-editor button:hover { background: var(--g-beige); color: var(--g-dark); }
.data-editor .status-msg { font-size: 12px; color: var(--g-green); margin-top: 8px; min-height: 18px; }

@media print { body { background: #fff; } .data-editor, .upload-section, .controls-bar, .download-bar { display: none; } .scorecard { break-inside: avoid; } }
@media (max-width: 768px) { .exec-grid { grid-template-columns: repeat(2, 1fr); } .sc-body { grid-template-columns: 1fr; } .rank-row, .rank-header { grid-template-columns: 24px 120px 1fr 80px 60px; gap: 8px; } }
</style>
</head>
<body>
<!-- PIN LOGIN GATE -->

function fmt(n) { return '$' + Math.round(n).toLocaleString('en-US'); }
function fmtD(n) { return '$' + n.toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2}); }
function pct(n) { return (n*100).toFixed(1)+'%'; }
function slug(s) { return s.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/-+$/,''); }
function getStatus(r) { if(r>=0.9) return {text:'On Track',cls:'status-green',color:'var(--g-green)'}; if(r>=0.7) return {text:'At Risk',cls:'status-amber',color:'var(--g-amber)'}; return {text:'Behind',cls:'status-red',color:'var(--g-red)'}; }
function monthLabel(key) { const [y,m] = key.split('-'); return new Date(y,m-1).toLocaleDateString('en-US',{month:'long',year:'numeric'}); }

/* ============================================
   DATE HELPERS — shared by XLSX parser & Google Sheets
   ============================================ */
function toISODate(d) {
  if (!d || d === 'All') return null;
  if (d instanceof Date && !isNaN(d)) return d.toISOString().slice(0, 10);
  if (typeof d === 'string') {
    const m = d.match(/^(\d{4}-\d{2}-\d{2})/); if (m) return m[1];
    const mdy = d.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);
    if (mdy) return mdy[3] + '-' + mdy[1].padStart(2,'0') + '-' + mdy[2].padStart(2,'0');
  }
  if (typeof d === 'number' && d > 40000 && d < 60000) {
    const dt = new Date((d - 25569) * 86400000);
    if (!isNaN(dt)) return dt.toISOString().slice(0, 10);
  }
  return null;
}
function toMonthKey(d) { const s = toISODate(d); return s ? s.slice(0, 7) : null; }
function toDateStr(d) { return toISODate(d); }
function isAllRow(d) { return d === undefined || d === null || d === '' || String(d) === 'All'; }

/* ============================================
   XLSX PARSER
   ============================================ */
function parseXLSX(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = function(e) {
      try {
        const wb = XLSX.read(e.target.result, {type:'array', cellDates:true});
        const wp = XLSX.utils.sheet_to_json(wb.Sheets['Weekly_Pacing'] || wb.Sheets[wb.SheetNames[3]]);
        const raw = XLSX.utils.sheet_to_json(wb.Sheets['Raw_Data services'] || wb.Sheets[wb.SheetNames[0]]);
        const prod = XLSX.utils.sheet_to_json(wb.Sheets['Raw_Product_Data'] || wb.Sheets[wb.SheetNames[1]]);

        // Detect month from dates (handles Date objects, strings, and Excel serial numbers)
        let monthKey = null, monthName = null, asOf = null, weekEnd = null;
        for(const r of raw) {
          monthKey = toMonthKey(r['SaleDate Date']);
          if (monthKey) break;
        }
        if(!monthKey) { reject('Could not detect month from data'); return; }
        monthName = monthLabel(monthKey);

        // Weekly pacing dates
        for(const r of wp) {
          if(r['As Of (Saturday)'] === 'Week End' || r['As Of (Saturday)'] === 'Month End') {
            const v = Object.values(r).find(v => v instanceof Date);
            if(v) { asOf = v.toISOString().slice(0,10); weekEnd = asOf; }
          }
        }
        if(!asOf) { const lastDay = new Date(monthKey+'-28'); asOf = lastDay.toISOString().slice(0,10); weekEnd = asOf; }

        // Parse providers from Weekly Pacing
        const providerNames = wp.map(r => r['Provider']).filter(Boolean);
        const teamGoal = wp.reduce((s,r) => s + (Number(r['Monthly Goal'])||0), 0);
        const providers = [];

        for(const row of wp) {
          const name = row['Provider'];
          if(!name) continue;

          // Categories from raw data
          const categories = {};
          for(const r of raw) {
            if(r['Staff Name'] === name && r['Service category_name'] && r['Service category_name'] !== 'All' && isAllRow(r['SaleDate Date'])) {
              categories[r['Service category_name']] = {
                revenue: Number(r['Service Sales'])||0,
                appointments: Number(r['Appointment Count'])||0,
                hours: Number(r['Service Hours'])||0
              };
            }
          }

          // Top products
          const topProducts = [];
          for(const r of prod) {
            if(r['Staff Name'] === name && r['Product name'] && r['Product name'] !== 'All' && isAllRow(r['SaleDate Date'])) {
              const amt = Number(r['Gross Retail Product Sales']);
              if(amt > 0) topProducts.push({name: r['Product name'], amount: amt});
            }
          }
          topProducts.sort((a,b) => b.amount - a.amount);

          // Appointments/hours from raw All row
          let appts = 0, hrs = 0;
          for(const r of raw) {
            if(r['Staff Name'] === name && r['Service category_name'] === 'All' && isAllRow(r['SaleDate Date'])) {
              appts = Number(r['Appointment Count'])||0;
              hrs = Number(r['Service Hours'])||0;
              break;
            }
          }

          providers.push({
            name, role: name === 'Dr Silkey' ? 'Medical Director' : 'Provider',
            goal: Number(row['Monthly Goal'])||0,
            thisWeek: { service: Number(row['This Week Service'])||0, product: Number(row['This Week Product'])||0 },
            mtd: { service: Number(row['MTD Service'])||0, product: Number(row['MTD Product'])||0 },
            appointments: appts, hours: hrs,
            categories, topProducts: topProducts.slice(0,8)
          });
        }

        resolve({ month: monthName, key: monthKey, asOf, weekEnding: weekEnd, teamGoal, providers });
      } catch(e) { reject(e.message); }
    };
    reader.readAsArrayBuffer(file);
  });
}

async function loadOneRevenueSheet(sheetId) {
  const BASE = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:csv`;
  const tabs = ['Weekly_Pacing', 'Raw_Data services', 'Raw_Product_Data'];
  try {
    const csvs = await Promise.all(
      tabs.map(t => fetch(`${BASE}&sheet=${encodeURIComponent(t)}`).then(r => {
        if (!r.ok) throw new Error(`${t}: ${r.status}`);
        return r.text();
      }))
    );
    const toJson = csv => { const wb = XLSX.read(csv, {type:'string'}); return XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]); };
    const toArr = csv => { const wb = XLSX.read(csv, {type:'string'}); return XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {header:1}); };
    const money = v => { if (typeof v === 'number') return v; if (!v) return 0; return Number(String(v).replace(/[$,]/g, '')) || 0; };
    // Strip duplicate header rows (Bonnie pastes weekly exports which include headers)
    function stripDuplicateHeaders(rows) {
      return rows.filter(r => r['Staff Name'] !== 'Staff Name');
    }
    const raw = stripDuplicateHeaders(toJson(csvs[1]));
    const prod = stripDuplicateHeaders(toJson(csvs[2]));
    const wpRows = toArr(csvs[0]);

    // Detect ALL unique months from date rows
    const monthSet = new Set();
    let sampleDates = [];
    for (const r of raw) {
      const mk = toMonthKey(r['SaleDate Date']);
      if (mk) monthSet.add(mk);
      else if (r['SaleDate Date'] && sampleDates.length < 3) sampleDates.push(String(r['SaleDate Date']));
    }
    if (sampleDates.length > 0) console.warn('[Dashboard] Unparseable SaleDate Date samples:', sampleDates);
    if (monthSet.size === 0) {
      console.error('[Dashboard] No months detected from SaleDate Date column. Check column name and date formats.');
      SYNC_STATUS = { state: 'error', lastSync: new Date().toISOString(), error: 'No months found in Sheet data — check SaleDate Date column' };
      route();
      return;
    }
    const allMonths = Array.from(monthSet).sort();

    // Two-pass month tagging: first build a map of row index → month from dated rows,
    // then assign "All" rows to the nearest FOLLOWING month (not just previous)
    function tagRows(rows) {
      // Pass 1: tag rows that have explicit dates or Month_Key
      const tagged = rows.map(r => {
        const d = r['SaleDate Date'];
        const mk = r['Month_Key'];
        let month = null;
        if (mk) {
          const mkStr = String(mk);
          const m = mkStr.match(/(\d{4})-(\d{2})/);
          if (m) month = m[1] + '-' + m[2];
          else { const dt = new Date(mkStr + ' 1'); if (!isNaN(dt)) month = dt.toISOString().slice(0,7); }
        }
        if (!month) month = toMonthKey(d);
        return { ...r, _month: month };
      });

      // Pass 2: fill in nulls — look forward first, then backward
      for (let i = 0; i < tagged.length; i++) {
        if (tagged[i]._month) continue;
        // Look forward for the next dated row's month
        let found = null;
        for (let j = i + 1; j < tagged.length && j < i + 50; j++) {
          if (tagged[j]._month) { found = tagged[j]._month; break; }
        }
        // Fall back to looking backward
        if (!found) {
          for (let j = i - 1; j >= 0 && j > i - 50; j--) {
            if (tagged[j]._month) { found = tagged[j]._month; break; }
          }
        }
        tagged[i]._month = found;
      }
      return tagged;
    }
    const taggedRaw = tagRows(raw);
    const taggedProd = tagRows(prod);

    // Parse Weekly_Pacing — goals are static for the year
    let teamGoal = 0, wpAsOf = null, wpWeekEnd = null;
    const wpProviders = [];
    for (let i = 1; i < wpRows.length; i++) {
      const row = wpRows[i];
      if (!row || !row[0]) continue;
      const name = String(row[0]).trim();
      if (['provider',''].includes(name.toLowerCase())) continue;
      if (/^(week|month)\s+(start|end)/i.test(name)) {
        for (let c = 1; c < row.length; c++) {
          const v = String(row[c] || '');
          if (/^\d{4}-\d{2}-\d{2}/.test(v)) { wpAsOf = v.slice(0,10); wpWeekEnd = v.slice(0,10); }
        }
        continue;
      }
      const goal = money(row[1]);
      teamGoal += goal;
      wpProviders.push({ name, goal, twS: money(row[3]), twP: money(row[4]), mtdS: money(row[6]), mtdP: money(row[7]) });
    }
    if (!wpProviders.length) {
      console.error('[Dashboard] No providers found in Weekly_Pacing tab.');
      SYNC_STATUS = { state: 'error', lastSync: new Date().toISOString(), error: 'No providers found in Weekly_Pacing tab' };
      route();
      return;
    }

    const latestMonth = allMonths[allMonths.length - 1];

    // Build state for each month
    for (const monthKey of allMonths) {
      const monthRaw = taggedRaw.filter(r => r._month === monthKey);
      const monthProd = taggedProd.filter(r => r._month === monthKey);
      const isLatest = monthKey === latestMonth;

      // Find latest date in this month for asOf
      let monthAsOf = null;
      for (const r of monthRaw) {
        const d = r['SaleDate Date'];
        const dStr = toDateStr(d);
        if (dStr && dStr.startsWith(monthKey)) {
          if (!monthAsOf || dStr > monthAsOf) monthAsOf = dStr;
        }
      }
      if (!monthAsOf) { const [y, m] = monthKey.split('-'); monthAsOf = new Date(Number(y), Number(m), 0).toISOString().slice(0, 10); }

      const providers = [];
      for (const wp of wpProviders) {
        const name = wp.name;

        // Categories from this month's "All" rows
        const categories = {};
        for (const r of monthRaw) {
          if (r['Staff Name'] === name && r['Service category_name'] && r['Service category_name'] !== 'All' && isAllRow(r['SaleDate Date'])) {
            categories[r['Service category_name']] = { revenue: money(r['Service Sales']), appointments: Number(r['Appointment Count']) || 0, hours: Number(r['Service Hours']) || 0 };
          }
        }

        // If no "All" rows found for this month, aggregate from individual date rows
        if (Object.keys(categories).length === 0) {
          for (const r of monthRaw) {
            if (r['Staff Name'] === name && r['Service category_name'] && r['Service category_name'] !== 'All' && !isAllRow(r['SaleDate Date'])) {
              const cat = r['Service category_name'];
              if (!categories[cat]) categories[cat] = { revenue: 0, appointments: 0, hours: 0 };
              categories[cat].revenue += money(r['Service Sales']);
              categories[cat].appointments += Number(r['Appointment Count']) || 0;
              categories[cat].hours += Number(r['Service Hours']) || 0;
            }
          }
        }

        // Top products from this month's "All" rows
        const topProducts = [];
        for (const r of monthProd) {
          if (r['Staff Name'] === name && r['Product name'] && r['Product name'] !== 'All' && isAllRow(r['SaleDate Date'])) {
            const amt = money(r['Gross Retail Product Sales']);
            if (amt > 0) topProducts.push({ name: r['Product name'], amount: amt });
          }
        }
        // Fallback: aggregate from individual product rows
        if (topProducts.length === 0) {
          const prodMap = {};
          for (const r of monthProd) {
            if (r['Staff Name'] === name && r['Product name'] && r['Product name'] !== 'All' && !isAllRow(r['SaleDate Date'])) {
              const pn = r['Product name'];
              if (!prodMap[pn]) prodMap[pn] = 0;
              prodMap[pn] += money(r['Gross Retail Product Sales']);
            }
          }
          for (const [pn, amt] of Object.entries(prodMap)) {
            if (amt > 0) topProducts.push({ name: pn, amount: amt });
          }
        }
        topProducts.sort((a, b) => b.amount - a.amount);

        // Appointments & hours
        let appts = 0, hrs = 0;
        for (const r of monthRaw) {
          if (r['Staff Name'] === name && r['Service category_name'] === 'All' && isAllRow(r['SaleDate Date'])) {
            appts = Number(r['Appointment Count']) || 0; hrs = Number(r['Service Hours']) || 0; break;
          }
        }
        // Fallback: sum from individual rows
        if (appts === 0 && hrs === 0) {
          for (const r of monthRaw) {
            if (r['Staff Name'] === name && !isAllRow(r['SaleDate Date']) && r['Service category_name'] !== 'All') {
              appts += Number(r['Appointment Count']) || 0; hrs += Number(r['Service Hours']) || 0;
            }
          }
        }

        // MTD from Raw_Data categories + products (always calculated, not from Weekly_Pacing)
        const svcTotal = Object.values(categories).reduce((s, c) => s + c.revenue, 0);
        let prodTotal = 0;
        for (const r of monthProd) {
          if (r['Staff Name'] === name && r['Product name'] === 'All' && isAllRow(r['SaleDate Date'])) {
            prodTotal = money(r['Gross Retail Product Sales']); break;
          }
        }
        if (prodTotal === 0) prodTotal = topProducts.reduce((s, p) => s + p.amount, 0);
        let thisWeek, mtd;
        if (isLatest) {
          thisWeek = { service: wp.twS, product: wp.twP };
          mtd = { service: svcTotal || wp.mtdS, product: prodTotal || wp.mtdP };
        } else {
          thisWeek = { service: 0, product: 0 };
          mtd = { service: svcTotal, product: prodTotal };
        }

        providers.push({ name, role: PROVIDER_ROLES[name] || 'Provider', goal: wp.goal,
          thisWeek, mtd, appointments: appts, hours: hrs, categories, topProducts: topProducts.slice(0, 8) });
      }

      const asOf = isLatest && wpAsOf ? wpAsOf : monthAsOf;
      const weekEnd = isLatest && wpWeekEnd ? wpWeekEnd : monthAsOf;
      STATE.months[monthKey] = { month: monthLabel(monthKey), key: monthKey, asOf, weekEnding: weekEnd, teamGoal, providers };
    }

    STATE.currentMonth = latestMonth;
  } catch (e) {
    console.error('[Dashboard] Sheet fetch failed:', e);
  }
}

/* ============================================
   AGGREGATION (Quarter / Year)
   ============================================ */
function aggregateMonths(keys) {
  const months = keys.map(k => STATE.months[k]).filter(Boolean);
  if(months.length === 0) return null;
  if(months.length === 1) return months[0];

  const allNames = new Set();
  months.forEach(m => m.providers.forEach(p => allNames.add(p.name)));

  const providers = [];
  for(const name of allNames) {
    const pMonths = months.map(m => m.providers.find(p => p.name === name)).filter(Boolean);
    if(pMonths.length === 0) continue;

    const merged = {
      name, role: pMonths[0].role,
      goal: pMonths.reduce((s,p) => s + p.goal, 0),
      thisWeek: { service: pMonths[pMonths.length-1].thisWeek.service, product: pMonths[pMonths.length-1].thisWeek.product },
      mtd: { service: pMonths.reduce((s,p) => s + p.mtd.service, 0), product: pMonths.reduce((s,p) => s + p.mtd.product, 0) },
      appointments: pMonths.reduce((s,p) => s + p.appointments, 0),
      hours: pMonths.reduce((s,p) => s + p.hours, 0),
      categories: {}, topProducts: []
    };

    // Merge categories
    for(const pm of pMonths) {
      for(const [cat, data] of Object.entries(pm.categories||{})) {
        if(!merged.categories[cat]) merged.categories[cat] = {revenue:0,appointments:0,hours:0};
        merged.categories[cat].revenue += data.revenue;
        merged.categories[cat].appointments += data.appointments;
        merged.categories[cat].hours += data.hours;
      }
    }

    // Merge products
    const prodMap = {};
    for(const pm of pMonths) {
      for(const pr of (pm.topProducts||[])) {
        prodMap[pr.name] = (prodMap[pr.name]||0) + pr.amount;
      }
    }
    merged.topProducts = Object.entries(prodMap).map(([name,amount]) => ({name,amount})).sort((a,b) => b.amount - a.amount).slice(0,8);
    providers.push(merged);
  }

  const teamGoal = months.reduce((s,m) => s + m.teamGoal, 0);
  const label = months.length <= 3 ? 'Q' + Math.ceil(parseInt(months[0].key.split('-')[1])/3) + ' ' + months[0].key.split('-')[0]
    : months[0].key.split('-')[0] + ' Annual';

  return { month: label, key: 'agg', asOf: months[months.length-1].asOf, weekEnding: months[months.length-1].weekEnding, teamGoal, providers };
}

   ============================================ */
async function loadCommissionData() {
  if (!COMMISSION_SHEET_ID) return;
  try {
    const BASE = 'https://docs.google.com/spreadsheets/d/' + COMMISSION_SHEET_ID + '/gviz/tq?tqx=out:csv';
    const resp = await fetch(BASE + '&sheet=' + encodeURIComponent('Commission_Summary'));
    if (!resp.ok) return;
    const csv = resp.text();
    const wb = XLSX.read(await csv, {type:'string'});
    const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
    if (!rows.length) return;

    const money = function(v) { if (typeof v === 'number') return v; if (!v) return 0; return Number(String(v).replace(/[$,]/g, '')) || 0; };
    var providers = {};
    var grandTotal = 0;
    for (var i = 0; i < rows.length; i++) {
      var r = rows[i];
      var name = String(r['Provider'] || '').trim();
      if (!name) continue;
      var mapEntry = COMMISSION_PROVIDER_MAP[name];
      var svc = money(r['Service']);
      var prod = money(r['Product']);
      var pkg = money(r['Package']);
      var tips = money(r['Tips']);
      var total = money(r['Total']);
      providers[name] = { service: svc, product: prod, package: pkg, tips: tips, grand: total, type: mapEntry ? mapEntry.type : 'commission' };
      grandTotal += total;
    }
    COMMISSION_DATA = { providers: providers, grandTotal: grandTotal };
  } catch (e) {
    // Commission data load is non-fatal — dashboard works without it
  }
}

function getViewData() {
  const keys = Object.keys(STATE.months).sort();
  if(STATE.period === 'month') return STATE.months[STATE.currentMonth];

  const ci = keys.indexOf(STATE.currentMonth);
  if(STATE.period === 'quarter') {
    const start = Math.max(0, ci - 2);
    return aggregateMonths(keys.slice(start, ci + 1));
  }
  if(STATE.period === 'year') {
    const start = Math.max(0, ci - 11);
    return aggregateMonths(keys.slice(start, ci + 1));
  }
  return STATE.months[STATE.currentMonth];
}

      <div class="rank-header"><span>#</span><span>Provider</span><span>Progress</span><span>Revenue</span><span>% Goal</span></div>
      ${ranked.map((p,i)=>{const t=p.mtd.service+p.mtd.product;const r=t/p.goal;const s=getStatus(r);const su=SECURE_URLS[slug(p.name)];return`<div class="rank-row" onclick="${su?`window.open('${su}','_blank')`:`location.hash='${slug(p.name)}'`}"><div class="rank-num">${i+1}</div><div class="rank-name">${p.name}<span class="title">${p.role}</span></div><div class="rank-bar"><div class="rank-bar-fill" style="width:${Math.min(r*100,100)}%;background:${s.color}"></div></div><div class="rank-rev">${fmt(t)}</div><div class="rank-pct" style="color:${s.color}">${pct(r)}</div></div>`;}).join('')}
    </div>
    ${renderCommissionSummary()}
    <div class="section-label">Provider Scorecards</div>
    <div class="scorecards">${ranked.map(p=>renderScorecard(p,showWeekly)).join('')}</div>
    <div class="dash-footer"><p>Gi&oacute;va Aesthetics + Wellness &bull; 192 S Main St, Kaysville, UT 84037 &bull; (385) 554-1606</p><p style="margin-top:4px;opacity:0.5">Confidential &mdash; Internal Use Only</p></div>`;

  setupDragDrop();
}

function renderProvider(provSlug) {
  const data = getViewData();
  if(!data) return;
  const p = data.providers.find(pr=>slug(pr.name)===provSlug);
  if(!p) { renderExecutive(); return; }
  const showWeekly = STATE.period === 'month';

  document.getElementById('app').innerHTML = `${renderHeader(data)}
    <div class="nav-bar">
      <a class="nav-btn" href="#">All Providers</a>
      ${data.providers.map(pr=>`<a class="nav-btn ${slug(pr.name)===provSlug?'active':''}" href="${SECURE_URLS[slug(pr.name)]||'#'+slug(pr.name)}" ${SECURE_URLS[slug(pr.name)]?'target="_blank"':''}>${pr.name}</a>`).join('')}
    </div>
    <div class="download-bar">
      <button class="dl-btn" onclick="downloadProvider('${slug(p.name)}')">${DL_ICON} Download Scorecard</button>
      <button class="dl-btn" onclick="shareProvider('${slug(p.name)}')">${SHARE_ICON} Copy Secure Link</button>
      ${SECURE_URLS[slug(p.name)] ? `<span style="font-family:'Roboto Condensed',sans-serif;font-size:10px;letter-spacing:1px;color:var(--g-pigeon);align-self:center">Copies their private dashboard link — they can only see their own data</span>` : ''}
    </div>
    <div class="scorecards">${renderScorecard(p,showWeekly)}</div>
    <div class="dash-footer"><p>Gi&oacute;va Aesthetics + Wellness &bull; 192 S Main St, Kaysville, UT 84037 &bull; (385) 554-1606</p><p style="margin-top:4px;opacity:0.5">Confidential &mdash; Internal Use Only</p></div>`;
}

/* ============================================
   ROUTING & CONTROLS
   ============================================ */
function route() {
  const h = location.hash.slice(1);
  if(h && h !== '') renderProvider(h); else renderExecutive();
  window.scrollTo(0,0);
}

function setPeriod(p) { STATE.period = p; saveState(); route(); }
function setMonth(k) { STATE.currentMonth = k; saveState(); route(); }

window.addEventListener('hashchange', route);

/* ============================================
   FILE UPLOAD
   ============================================ */
async function handleFile(file) {
  if(!file) return;
  const status = document.getElementById('uploadStatus');
  status.style.color = 'var(--g-pigeon)';
  status.textContent = 'Parsing ' + file.name + '...';
  try {
    const data = await parseXLSX(file);
    STATE.months[data.key] = data;
    STATE.currentMonth = data.key;
    saveState();
    status.style.color = 'var(--g-green)';
    status.textContent = data.month + ' loaded successfully!';
    setTimeout(route, 800);
  } catch(e) {
    status.style.color = 'var(--g-red)';
    status.textContent = 'Error: ' + e;
  }
}

function deleteMonth(key) {
  if(!confirm('Delete ' + monthLabel(key) + ' data?')) return;
  delete STATE.months[key];
  const keys = Object.keys(STATE.months).sort();
  STATE.currentMonth = keys.length > 0 ? keys[keys.length-1] : null;
  saveState(); route();
}

function setupDragDrop() {
  const zone = document.getElementById('uploadZone');
  if(!zone) return;
  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag-over'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
  zone.addEventListener('drop', e => { e.preventDefault(); zone.classList.remove('drag-over'); if(e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]); });
}

/* ============================================
   DOWNLOADS
   ============================================ */
function downloadCard(el,name) { html2canvas(el,{scale:2,backgroundColor:'#f4efea',useCORS:true}).then(c=>{const a=document.createElement('a');a.download=name;a.href=c.toDataURL('image/png');a.click();}); }
function downloadProvider(s) { const el=document.getElementById('card-'+s); if(el) downloadCard(el,'GIOVA-'+s+'.png'); }
function downloadSelected() { const s=document.getElementById('provSelect'); if(s&&s.value) downloadProvider(s.value); }
function downloadAll() { document.querySelectorAll('.scorecard').forEach((el,i)=>setTimeout(()=>downloadCard(el,'GIOVA-'+el.id.replace('card-','')+'.png'),i*500)); }
function shareProvider(s) { const u=SECURE_URLS[s]||location.origin+location.pathname+'#'+s; navigator.clipboard.writeText(u).then(()=>alert('Secure link copied!\\n'+u)); }

/* ============================================
   PIN AUTH
   ============================================ */
function checkPin() {
  var pin = document.getElementById('pinInput').value;
  if (pin === '2046') {
    document.getElementById('loginGate').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    loadState();
    route();
    loadFromGoogleSheets();
    loadCommissionData().then(function() { if (COMMISSION_DATA) route(); });
  } else {
    document.getElementById('pinError').textContent = 'Incorrect PIN';
    document.getElementById('pinInput').value = '';
    document.getElementById('pinInput').focus();
  }
}

/* ============================================
   INIT
   ============================================ */
document.getElementById('pinInput').focus();
</script>
</body>
</html>
